- name: Deploy to Tomcat
  hosts: web
  become: yes

  tasks:
    - name: Copy WAR file
      copy:
        src: "/var/snap/jenkins/5042/workspace/myweb/target/MyWeb.war"
        dest: "/opt/tomcat/webapps/MyWeb.war"
        remote_src: no
    - name: Restart Tomcat
      shell: /opt/tomcat/bin/shutdown.sh && /opt/tocat/bin/startup.sh

